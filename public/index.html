<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    h1 { font-size: 5rem; margin: 0.25rem 0; }
    .controls { display: flex; gap: 1rem; margin-top: 1rem; }
    button {
      font-size: 1.5rem;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #333;
      color: #fff;
    }
    button:hover { background: #555; }
  </style>
</head>
<body>
  <p>Count</p>
  <h1 id="count">—</h1>
  <div class="controls">
    <button id="dec">−</button>
    <button id="inc">+</button>
  </div>

  <script>
    const countEl = document.getElementById("count");

    async function fetchCount() {
      const res = await fetch("/api/count");
      const data = await res.json();
      countEl.textContent = data.count;
    }

    async function update(action) {
      const res = await fetch(`/api/count/${action}`, { method: "POST" });
      const data = await res.json();
      countEl.textContent = data.count;
    }

    document.getElementById("inc").addEventListener("click", () => update("increment"));
    document.getElementById("dec").addEventListener("click", () => update("decrement"));

    fetchCount();
  </script>
</body>
</html>
